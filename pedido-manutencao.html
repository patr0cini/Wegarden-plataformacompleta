<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedir orçamento de manutenção · We Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --verde:#1F4D2E; --verde-claro:#3D7A4E; --verde-suave:#E8F0EA;
  --cal:#F7F5F0; --tinta:#22241F; --cinza:#6B6F66; --linha:#E3E0D8; --erro:#A33B2E;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:transparent;color:var(--tinta);font-size:15px;padding:8px}
.cartao{max-width:640px;margin:0 auto;background:#fff;border:1px solid var(--linha);border-radius:14px;padding:28px}
h1{font-family:'Syne',sans-serif;font-size:22px;color:var(--verde);margin-bottom:6px}
.sub{color:var(--cinza);font-size:13.5px;margin-bottom:22px}
form{display:grid;grid-template-columns:1fr 1fr;gap:14px}
label{display:flex;flex-direction:column;gap:6px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--cinza)}
label.c2{grid-column:span 2}
input,select,textarea{font:inherit;font-size:15px;color:var(--tinta);border:1px solid var(--linha);border-radius:8px;padding:11px 13px;background:#fff;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--verde-claro);box-shadow:0 0 0 3px rgba(61,122,78,.14)}
textarea{resize:vertical;min-height:88px}
.hp{position:absolute;left:-9999px;top:-9999px;height:1px;width:1px;overflow:hidden}
button{grid-column:span 2;font:700 16px 'DM Sans',sans-serif;background:var(--verde);color:#fff;border:none;border-radius:10px;padding:14px;cursor:pointer;transition:background .15s}
button:hover{background:#173E24}
button:disabled{opacity:.6;cursor:default}
.msg{grid-column:span 2;padding:12px 14px;border-radius:8px;font-size:14px;display:none}
.msg.ok{display:block;background:var(--verde-suave);color:var(--verde);border:1px solid #D5E2D8}
.msg.erro{display:block;background:#F6E7E4;color:var(--erro);border:1px solid #EAD0CB}
.obrig{color:var(--erro)}
@media (max-width:560px){form{grid-template-columns:1fr}label.c2,button,.msg{grid-column:span 1}}
</style>
</head>
<body>
<div class="cartao">
  <h1>Manutenção de Espaços Verdes</h1>
  <p class="sub">Peça um orçamento sem compromisso — respondemos com a maior brevidade.</p>
  <form id="f" onsubmit="return enviar(event)">
    <label>Nome <span class="obrig">*</span><input type="text" id="nome" required maxlength="120"></label>
    <label>Telefone <span class="obrig">*</span><input type="tel" id="telefone" required maxlength="30"></label>
    <label class="c2">Email<input type="email" id="email" maxlength="160"></label>
    <label>Localidade <span class="obrig">*</span><input type="text" id="localidade" required maxlength="80" placeholder="ex. Cascais"></label>
    <label>Tipo de espaço
      <select id="tipo">
        <option value="">—</option>
        <option>Condomínio</option><option>Particular</option><option>Empresa</option>
        <option>Hotel</option><option>Outro</option>
      </select>
    </label>
    <label>Área aproximada<input type="text" id="area" maxlength="80" placeholder="ex. 500 m²"></label>
    <label>Periodicidade desejada
      <select id="periodicidade">
        <option value="">Não sei / a definir</option>
        <option value="diario">Diário (2ª a 6ª)</option>
        <option value="3x">3× por semana</option>
        <option value="2x">2× por semana</option>
        <option value="semanal">Semanal</option>
        <option value="quinzenal">Quinzenal</option>
        <option value="mensal">Mensal</option>
      </select>
    </label>
    <label class="c2">Mensagem<textarea id="mensagem" maxlength="2000" placeholder="Descreva o espaço e o que precisa…"></textarea></label>
    <!-- honeypot anti-spam: humanos não veem nem preenchem -->
    <label class="hp" aria-hidden="true">Website<input type="text" id="website" tabindex="-1" autocomplete="off"></label>
    <div class="msg" id="msg"></div>
    <button type="submit" id="btn">Pedir orçamento</button>
  </form>
</div>

<script>
const SB_URL = 'https://kgpwpzluqnekqckltkys.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtncHdwemx1cW5la3Fja2x0a3lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTg1NzcsImV4cCI6MjA5NDkzNDU3N30.pno5YwPb1z2dphWX00eenX1t2aDCbrFO6l1Knk7uyhI';

function mostrar(tipo, texto) {
  const m = document.getElementById('msg');
  m.className = 'msg ' + tipo;
  m.textContent = texto;
}
async function enviar(ev) {
  ev.preventDefault();
  // honeypot + rate limit simples (1 envio por minuto por browser)
  if (document.getElementById('website').value) return false;
  const ultimo = +localStorage.getItem('wg_env') || 0;
  if (Date.now() - ultimo < 60000) { mostrar('erro', 'Já recebemos o seu pedido — aguarde um minuto antes de enviar outro.'); return false; }

  const v = id => document.getElementById(id).value.trim();
  const row = {
    nome: v('nome'), telefone: v('telefone'), email: v('email'),
    localidade: v('localidade'), tipo_espaco: document.getElementById('tipo').value,
    area_aprox: v('area'), periodicidade: document.getElementById('periodicidade').value,
    mensagem: v('mensagem'), origem: 'site', estado: 'Não iniciado'
  };
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'A enviar…';
  try {
    const r = await fetch(SB_URL + '/rest/v1/man_pedidos', {
      method: 'POST',
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify(row)
    });
    if (!r.ok) throw new Error(await r.text());
    localStorage.setItem('wg_env', Date.now());
    document.getElementById('f').reset();
    mostrar('ok', 'Pedido recebido! Entraremos em contacto brevemente. Obrigado.');
    btn.textContent = 'Enviado ✓';
  } catch (e) {
    console.error(e);
    mostrar('erro', 'Não foi possível enviar. Tente novamente ou ligue-nos.');
    btn.disabled = false; btn.textContent = 'Pedir orçamento';
  }
  return false;
}
</script>
</body>
</html>
